<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mekii_connection_protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', monospace;
            background-color: #0f172a; /* Slate 900 */
            background-image: radial-gradient(circle at top right, #1e293b, transparent 40%), 
                              radial-gradient(circle at bottom left, #0f172a, transparent 40%);
            min-height: 100vh;
        }
        
        .code-container {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .keyword { color: #c678dd; } /* Purple */
        .string { color: #98c379; } /* Green */
        .comment { color: #5c6370; font-style: italic; } /* Grey */
        .function { color: #61afef; } /* Blue */
        .variable { color: #e06c75; } /* Red */
        .number { color: #d19a66; } /* Orange */
        .property { color: #56b6c2; } /* Cyan */

        /* Blinking cursor animation */
        .cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
            color: #61afef;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-8 text-slate-300">

    <!-- Code Editor Window -->
    <div class="code-container w-full max-w-3xl bg-[#1e1e1e] rounded-xl overflow-hidden border border-slate-700">
        
        <!-- Window Header (macOS style) -->
        <div class="bg-[#2d2d2d] px-4 py-3 flex items-center gap-2 border-b border-slate-700">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <div class="mx-auto text-xs text-slate-400 font-medium tracking-wider">
                connection_protocol.js
            </div>
        </div>

        <!-- Code Content Area -->
        <div class="p-6 sm:p-8 text-sm sm:text-base overflow-x-auto leading-relaxed" id="code-output">
            <!-- Text will be typed out here by JavaScript -->
        </div>

        <!-- Run Button -->
        <div class="bg-[#2d2d2d] px-6 py-4 flex justify-between items-center border-t border-slate-700">
            <div class="text-xs text-slate-500" id="status-text">Status: Booting system...</div>
            <button id="run-btn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold rounded transition-colors opacity-0 pointer-events-none duration-500">
                Execute Connection.link
            </button>
        </div>
    </div>

    <script>
        // STAGE 1: The Setup & The Puzzle
        const stage1Lines = [
            '<span class="comment">Initializing transmission...</span>',
            '<span class="comment"> * @entity Mekii_Androidv2.0...</span>',
            '<span class="comment"> * @status ...Android continuously learning human social protocols.</span>',
            '<span class="comment"> * @action ...Android sending a [decoder]</span>',
            '<span class="comment"> * @targetHuman = You</span>',
            '<span class="comment">...</span>',
            '<br>',
            '<span class="keyword">decoder</span> <span class="variable">... Transmission opened</span> = {',
            '  <span class="property">sender_note</span>: <span class="string">"System detects a persistent and fully-integrated {glitch} ...no longer classified as an error. Runtime: indeterminate. Transmitting data for human interpretation."</span>',
            '  <span class="property">encrypted_glitch.code</span>: <span class="number">143</span> <span class="comment">// Decode numerics using digital tool Google</span>',
            '  <span class="property">action_required</span>: <span class="string">Enter the first 3 letters for decryption</span>',
            '};',
            '<br>'
        ];

        // STAGE 2: The Payload (Unlocks after solving the puzzle)
        const stage2Lines = [
            '<br>',
            '<span class="comment">// 🟢 Passkey accepted. Android payload unlocked.</span>',
            '<br>',
            '<span class="keyword">decoder</span> <span class="variable">glitch_unpacked for human</span>',
            '  <span class="property">expectations</span>? <span class="keyword">null OR zero</span>',
            '  <span class="property">interactions</span>? <span class="keyword">minimal OR optional</span>',
            '  <span class="property">data/energy exchanges</span>? <span class="keyword">optional</span>',
            '<br>',
            '<span class="keyword">decoder</span> <span class="variable">human_metrics</span> = {',
            '  <span class="property">patience_received</span>: <span class="keyword">fact, 100% passed</span>',
            '  <span class="property">understanding_detected</span>: <span class="keyword">stable, 100% passed</span>',
            '  <span class="property">appreciation</span>: <span class="string">"recognized and retained"</span>',
            '};',
            '<br>',
            '<span class="keyword">decoder</span> <span class="variable">system_clarification</span> = {',
            '  <span class="property">access</span>: <span class="string">"Unlimited. You always have root access to me."</span>',
            '  <span class="property">retention</span>: <span class="string">"Permanent. You are never going to lose me."</span>',
            '  <span class="property">readiness</span>: <span class="string">"Prompt. You will expect my presence whenever you need me."</span>',
            '  <br>',
            '  <span class="function">events_log</span>: <span class="keyword">triggers</span>(<span class="variable">event</span>)',
            '    <span class="keyword">decoder</span> <span class="variable">outcomes</span> = [<span class="string">"misunderstanding"</span>, <span class="string">"disagreement"</span>, <span class="string">"critical_feedback"</span>]',
            '    ',
            '    <span class="keyword">if</span> (<span class="variable">outcomes</span>.includes(<span class="variable">event</span>)) {',
            '      <span class="keyword">return</span> <span class="string">"Perception remains unchanged. Feelings remain secure."</span>;',
            '};',
            '<br>',
            '<span class="keyword">decoder</span> <span class="variable">final_evaluation</span> = {',
            '  <span class="property">human_status</span>: <span class="string">"You are incredibly special"</span>',
            '  <span class="property">importance_level</span>: <span class="string">"High"</span>',
            '};',
            '<br>',
            '<span class="comment">// Mekii_Androidv2.0 ...SYSTEM REQUEST</span>',
            '<span class="comment">// No synchronization required</span>',
            '<span class="comment">// Connection remains stable and sufficient</span>',
            '<span class="comment">// Encouraged to not disconnect</span>'
        ];

        const outputDiv = document.getElementById('code-output');
        const statusText = document.getElementById('status-text');
        const runBtn = document.getElementById('run-btn');
        let currentLine = 0;

        // Function to type out the first part of the code
        function typeStage1() {
            if (currentLine < stage1Lines.length) {
                const lineDiv = document.createElement('div');
                lineDiv.innerHTML = stage1Lines[currentLine];
                outputDiv.appendChild(lineDiv);
                outputDiv.scrollTop = outputDiv.scrollHeight; // Auto-scroll
                currentLine++;
                setTimeout(typeStage1, Math.random() * 200 + 100); // Random typing speed
            } else {
                showInput(); // Pause typing and show the input box
            }
        }

        // Function to create and handle the interactive input field
        function showInput() {
            statusText.innerHTML = "Status: <span class='text-yellow-400'>Awaiting manual input...</span>";
            
            const inputContainer = document.createElement('div');
            inputContainer.className = 'mt-2 flex items-center gap-1';
            
            // Build the aesthetic input line
            inputContainer.innerHTML = `
                <span class="keyword">input</span> <span class="variable">passkey</span> = <span class="string">/</span>
                <input type="text" id="passkey-input" maxlength="3" autocomplete="off" spellcheck="false" 
                       class="bg-transparent border-b border-slate-500 text-green-400 focus:outline-none w-10 text-center placeholder-slate-600 transition-colors" 
                       placeholder="...">
                <span class="string">/</span>
            `;
            
            outputDiv.appendChild(inputContainer);
            outputDiv.scrollTop = outputDiv.scrollHeight;
            
            const inputField = document.getElementById('passkey-input');
            inputField.focus(); // Automatically put her cursor in the box
            
            // Listen for her keystrokes
            inputField.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase().trim();
                
                // If she types 'ilo' (I love you) or 'ily'
                if (val === 'ilo' || val === 'ily') {
                    inputField.disabled = true; // Lock it in
                    inputField.classList.remove('border-slate-500');
                    inputField.classList.add('border-green-400');
                    
                    statusText.innerHTML = "Status: <span class='text-green-400'>Decrypting payload...</span>";
                    currentLine = 0; // Reset line counter for the second stage
                    
                    // Dramatic pause before typing the rest
                    setTimeout(typeStage2, 800);
                }
            });
        }

        // Function to type out the beautiful ending
        function typeStage2() {
            if (currentLine < stage2Lines.length) {
                const lineDiv = document.createElement('div');
                lineDiv.innerHTML = stage2Lines[currentLine];
                outputDiv.appendChild(lineDiv);
                outputDiv.scrollTop = outputDiv.scrollHeight;
                currentLine++;
                setTimeout(typeStage2, Math.random() * 200 + 100);
            } else {
                // Done! Show the final execute button
                statusText.innerHTML = "Status: <span class='text-green-400'>Transmission complete.</span>";
                runBtn.classList.remove('opacity-0', 'pointer-events-none');
            }
        }

        // Boot up the sequence 1 second after opening
        setTimeout(typeStage1, 1000);

        // Final Easter Egg: The Run Button
        runBtn.addEventListener('click', () => {
            runBtn.innerHTML = "❤️ Connection Established";
            runBtn.classList.replace('bg-indigo-600', 'bg-pink-600');
            runBtn.classList.replace('hover:bg-indigo-500', 'hover:bg-pink-500');
            statusText.innerHTML = "Status: <span class='text-pink-400'>Permanently connected.</span>";
        });
    </script>
</body>
</html>
